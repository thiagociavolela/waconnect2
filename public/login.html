<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login • WaConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="assets/css/css-login.css" rel="stylesheet" crossorigin="anonymous">
</head>

<body>
  <div class="login-card">
    <div class="text-center mb-4 position-relative d-flex flex-column align-items-center" style="z-index:1;">
      <div class="login-logo mb-3 d-flex justify-content-center align-items-center">
        <img src="/logo-login.png" alt="WaConnect">
      </div>
      <h4 class="login-title mb-1">Acessar o Painel</h4>
      <p class="login-sub mb-0">Use suas credenciais para acessar.</p>
    </div>
    <form id="login-form" novalidate>
      <div class="mb-3">
        <label class="form-label" for="user">Usuário</label>
        <input id="user" class="form-control" placeholder="" autocomplete="username" required />
      </div>
      <div class="mb-3">
        <label class="form-label" for="pass">Senha</label>
        <input id="pass" type="password" class="form-control" placeholder="" autocomplete="current-password" required />
      </div>
      <button class="btn btn-neon w-100" type="submit">Entrar</button>
    </form>
    <div class="alert alert-light border mt-3 mb-0 alert-area d-none" id="login-log" role="alert"></div>
  </div>

  <script>
    const INDEX_PAGE = '/';
    const loginForm = document.getElementById('login-form');
    const loginLog = document.getElementById('login-log');
    const userInput = document.getElementById('user');
    const passInput = document.getElementById('pass');

    void ensureSession();

    loginForm.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const user = userInput.value.trim();
      const pass = passInput.value.trim();
      loginLog.classList.add('d-none');
      loginLog.textContent = '';
      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user, pass })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          window.location.href = INDEX_PAGE;
        } else {
          showError(data.error || `Login falhou (status ${res.status}).`);
        }
      } catch (err) {
        showError('Erro de rede no login.');
      }
    });

    async function ensureSession() {
      try {
        const res = await fetch('/api/status');
        if (res.ok) {
          window.location.href = INDEX_PAGE;
        }
      } catch (err) {
        console.error(err);
      }
    }

    function showError(msg) {
      loginLog.textContent = msg;
      loginLog.classList.remove('d-none');
    }
  </script>
</body>

</html>
